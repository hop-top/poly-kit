name: CI (TypeScript)

on:
  push:
    branches: [main]
    paths: ["**.ts", "package.json", "package-lock.json", "pnpm-lock.yaml"]
  pull_request:
    branches: [main]
    paths: ["**.ts", "package.json", "package-lock.json", "pnpm-lock.yaml"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # >>> kit-managed: toolchain >>>
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      - run: mise run install
      # <<< kit-managed: toolchain <<<

      - name: Lint
        run: mise exec -- pnpm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # >>> kit-managed: toolchain >>>
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      - run: mise run install
      # <<< kit-managed: toolchain <<<

      - name: Test
        run: mise exec -- pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      # >>> kit-managed: toolchain >>>
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      - run: mise run install
      # <<< kit-managed: toolchain <<<

      - name: Build
        run: mise exec -- pnpm run build
