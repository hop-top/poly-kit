  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "{{PROJECT_NAME}}"
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    volumes:
      - ../.data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d {{PROJECT_NAME}}"]
      interval: 10s
      timeout: 5s
      retries: 5
