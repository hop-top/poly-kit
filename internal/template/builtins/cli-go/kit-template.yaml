name: cli-go
description: "Single-binary Go CLI with kit conventions (cobra + viper)"
kit_version: ">=0.4.0"

variables:
  - name: Name
    prompt: "Project name (lowercase, hyphens)"
    required: true
    validate: "^[a-z][a-z0-9-]{0,63}$"
  - name: Description
    prompt: "One-line description"
    default: "A {{.Name}} CLI"
  - name: Module
    prompt: "Go module path"
    default: "github.com/{{.Org}}/{{.Name}}"
  - name: NameUpper
    prompt: "Env-var prefix (uppercase)"
    default: "{{.Name}}"
  - name: Author
    prompt: "Author name"
    required: true
  - name: Email
    prompt: "Author email"
    required: true
  - name: Year
    prompt: "Copyright year"
    default: "{{.Year}}"
  - name: License
    type: choice
    choices: [MIT, Apache-2.0, BSD-3-Clause, Proprietary]
    default: MIT

files:
  exclude:
    - "kit-template.yaml"
    - "tiers.yaml"
    - "cmd/README.md"
    - "internal/README.md"
    - "tests/README.md"
  binary: []

hooks: {}
