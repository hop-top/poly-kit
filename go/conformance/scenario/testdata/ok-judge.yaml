schema_version: "1"
scenario_id: ok-judge
binary: spaced
factor_coverage: [4, 9]
tier: 3
story_ref:
  story_id: ok-judge-story
  story_path: stories/ok-judge.yaml
  content_hash: "sha256:1111111111111111111111111111111111111111111111111111111111111111"
steps:
  - id: report
    invoke: ["report", "--mission", "alpha"]
judge:
  - id: clarity-judge
    on: report
    prompt: |
      score the clarity of the report on a 0..1 scale
    model: stub
    model_allowlist: [stub]
assertions:
  - id: ok-exit
    kind: exit_code_equals
    on: report
    factor: 1
    value: 0
  - id: clarity
    kind: judge_score_above
    on: report
    factor: 4
    judge_id: clarity-judge
    value: 0.5
