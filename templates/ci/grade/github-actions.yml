# Adopter: copy to .github/workflows/conformance-grade.yml
# Requires:
#   secrets.KIT_CONFORMANCE_TOKEN — bearer for the grading service
#   GITHUB_TOKEN — supplied automatically by GitHub Actions
# Assumes the harness-based test at ./e2e/conformance records a
# cassette at ./testdata/cassettes/conformance.
name: conformance-grade
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
  pull-requests: write
  checks: write
jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version: stable
      - name: install kit
        run: go install hop.top/kit/cmd/kit@latest
      - name: record cassette
        run: go test ./e2e/conformance/...
      - name: grade
        env:
          KIT_CONFORMANCE_TOKEN: ${{ secrets.KIT_CONFORMANCE_TOKEN }}
          KIT_CONFORMANCE_SERVICE: ${{ vars.KIT_CONFORMANCE_SERVICE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          kit conformance grade \
            ./testdata/cassettes/conformance \
            --format=json \
            --pr-comment \
            --status-check \
            --output=/tmp/grade-result.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: conformance-grade-result
          path: /tmp/grade-result.json
