# Adopter: copy to .github/workflows/verify-stories.yml
# Requires kit binary on PATH. While `setup-kit` action is in
# development, install via go install:
#   go install hop.top/kit/cmd/kit@latest
name: verify-stories
on:
  pull_request:
    paths:
      - 'e2e/stories/**'
  push:
    branches: [main]
    paths:
      - 'e2e/stories/**'
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version: stable
      - name: install kit
        run: go install hop.top/kit/cmd/kit@latest
      - name: validate stories
        run: kit conformance verify-stories --paths=e2e/stories --format=json --output=/tmp/verify-stories.json
      # Belt-and-suspenders: leak-detector across the same paths.
      # A valid story passes both; an invalid one fails one or both.
      - name: leak-check stories
        run: kit conformance verify-no-leak --paths=e2e/stories --format=json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: failure()
        with:
          name: verify-stories-findings
          path: /tmp/verify-stories.json
