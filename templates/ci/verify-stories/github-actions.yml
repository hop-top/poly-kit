# Adopter: copy to .github/workflows/verify-stories.yml
# Requires kit binary on PATH. While `setup-kit` action is in
# development, install via go install:
#   go install hop.top/kit/cmd/kit@latest
name: verify-stories
on:
  pull_request:
    paths:
      - 'e2e/stories/**'
  push:
    branches: [main]
    paths:
      - 'e2e/stories/**'
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      # >>> kit-managed: toolchain >>>
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac  # v2
        with:
          install: true
          cache: true
      - run: mise run install
      # <<< kit-managed: toolchain <<<
      - name: install kit
        run: mise exec -- go install hop.top/kit/cmd/kit@latest
      - name: validate stories
        run: mise exec -- kit conformance verify-stories --paths=e2e/stories --format=json --output=/tmp/verify-stories.json
      # Belt-and-suspenders: leak-detector across the same paths.
      # A valid story passes both; an invalid one fails one or both.
      - name: leak-check stories
        run: mise exec -- kit conformance verify-no-leak --paths=e2e/stories --format=json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: failure()
        with:
          name: verify-stories-findings
          path: /tmp/verify-stories.json
