version: 2
project_name: spaced

builds:
  - id: spaced
    binary: spaced
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: spaced
    builds: [spaced]
    name_template: >-
      spaced_{{.Version}}_{{.Os}}_{{.Arch}}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^ci:'
      - '^test:'
