name: Changelog Rewrite

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  rewrite:
    if: startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect modified changelogs
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          FILES=$(git diff --name-only "$BASE_SHA" -- '**/CHANGELOG.md')
          if [ -z "$FILES" ]; then
            echo "No changelogs modified"
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "files<<EOF" >> "$GITHUB_OUTPUT"
            echo "$FILES" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Rewrite changelogs
        if: steps.detect.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG_FILES: ${{ steps.detect.outputs.files }}
        run: |
          chmod +x scripts/rewrite-changelog.sh

          while IFS= read -r f; do
            [ -z "$f" ] && continue
            dir=$(dirname "$f")
            case "$dir" in
              .)                    comp="Kit" ;;
              sdk/ts)               comp="Kit's TS SDK" ;;
              sdk/py)               comp="Kit's Python SDK" ;;
              sdk/experimental/rs)  comp="Kit's Rust SDK" ;;
              sdk/experimental/php) comp="Kit's PHP SDK" ;;
              incubator/qmochi)     comp="Qmochi" ;;
              *)                    comp="Kit" ;;
            esac
            ./scripts/rewrite-changelog.sh \
              --file "$f" --component "$comp"
          done <<< "$CHANGELOG_FILES"

      - name: Commit rewritten changelogs
        if: steps.detect.outputs.found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- '**/CHANGELOG.md'; then
            echo "No changes after rewrite (already processed)"
          else
            git add '**/CHANGELOG.md'
            git commit -m "chore: rewrite changelog"
            git push
          fi

  changelog-ready:
    needs: rewrite
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'release-please--')
    steps:
      - run: echo "Changelog rewrite complete"
