name: publish

on:
  push:
    tags: ['*/v*']

jobs:
  publish:
    permissions:
      contents: read
      id-token: write
    uses: hop-top/.github/.github/workflows/publish-on-tag.yml@v0
    secrets:
      NPM_REGISTRY_TOKEN: ${{ secrets.NPM_REGISTRY_TOKEN }}
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      PYPI_REGISTRY_TOKEN: ${{ secrets.PYPI_REGISTRY_TOKEN }}
      PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
      PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
      GH_MIRROR_PAT: ${{ secrets.GH_MIRROR_PAT }}
    with:
      homepage: https://github.com/hop-top/poly-kit
      description-prefix: "READ-ONLY MIRROR"
      ecosystems: |
        kit:
          dir: .
          ecosystem: go
          mirror: hop-top/kit
        kit-ts:
          dir: sdk/ts
          ecosystem: ts
          package: "@hop-top/kit"
          mirror: hop-top/kit-ts
          node-version: '22'
          # --exclude sqlstore.test.ts: depends on better-sqlite3
          # native bindings; --ignore-scripts blocks them. Mirrors
          # local `make test-ts`.
          test-command: pnpm install --frozen-lockfile --ignore-scripts && pnpm vitest run --exclude src/sqlstore.test.ts
        kit-py:
          dir: sdk/py
          ecosystem: py
          package: hop-top-kit
          mirror: hop-top/kit-py
          python-version: '3.11'
          test-command: pip install -e . && pytest
          # OIDC trusted publishing returned `invalid-publisher` despite
          # repeatedly correct pending-publisher claims (see uri-poly,
          # which hit the same and switched to token in
          # hop-top/.github#10). Use token auth until the PyPI side is
          # debugged; can revert to default oidc afterwards.
          pypi-auth: token
        kit-rs:
          dir: sdk/experimental/rs
          ecosystem: rs
          package: hop-top-kit
          mirror: hop-top/kit-rs
          rust-toolchain: stable
        kit-php:
          dir: sdk/experimental/php
          ecosystem: php
          package: hop-top/kit
          mirror: hop-top/kit-php
        qmochi:
          dir: incubator/qmochi
          ecosystem: go
          mirror: hop-top/qmochi
