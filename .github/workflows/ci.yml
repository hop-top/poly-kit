name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Stage 1: Lint ──────────────────────────────────────────────
  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # golangci-lint is installed by `make lint-go` -> `tools-golangci-lint`
      # at the version pinned by `GOLANGCI_LINT_VERSION` in the Makefile.
      # Single source of truth for local + CI.
      - run: make lint-go

  ts-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: make lint-ts

  py-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v4
      - run: cd sdk/py && uv sync --all-extras
      - run: make lint-py

  rs-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdk/experimental/rs
      - run: make lint-rs

  docs-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: make lint-docs
      - uses: lycheeverse/lychee-action@v2
        with:
          args: '--config examples/spaced/lychee.toml docs/ README.md'
          fail: false
      - name: Fail on broken internal links
        run: lychee --offline docs/ README.md

  sdk-paths-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make lint-sdk-paths

  # ── Stage 2: Test (after lint) ─────────────────────────────────
  go-test:
    needs: [go-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make test-go-integration

  ts-test:
    needs: [ts-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: make test-ts

  py-test:
    needs: [py-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v4
      - run: cd sdk/py && uv sync --all-extras
      - run: cd engine/sdk/py-kit-engine && uv sync --all-extras
      - run: make test-py

  rs-test:
    needs: [rs-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdk/experimental/rs
      - run: make test-rs

  # ── Stage 3: Parity (after all tests) ─────────────────────────
  parity:
    needs: [go-test, ts-test, py-test, rs-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v4
      # Rust toolchain + cache for the typeid-v1 contract loader
      # (tlc T-0753). test-parity (via test-parity-typeid) runs
      # `cargo test --features id --test contract` on every build.
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdk/experimental/rs
      # PHP toolchain for the typeid-v1 contract loader. The
      # test-parity-typeid target only runs the PHP leg when both
      # php and composer resolve on PATH; ubuntu-latest already
      # ships PHP 8.x + composer, so the contract test executes
      # here without an extra setup-php step.
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: cd sdk/py && uv sync --all-extras
      - run: make test-parity

  # ── Stage 4: Build + compliance (after parity) ────────────────
  compliance:
    needs: [parity]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build -buildvcs=false -o spaced ./examples/spaced/go/
      - run: ./spaced compliance --spec examples/spaced/spaced.toolspec.yaml --format json
