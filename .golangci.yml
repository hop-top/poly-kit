version: "2"

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - vendor
      - node_modules
      - .venv

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
  disable:
    - depguard
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (net/http.ResponseWriter).Write
        - os.Remove
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fscanln
        - fmt.Sscanf
        - (*database/sql.Rows).Close
        - (*database/sql.DB).Close
        - (*compress/gzip.Reader).Close
        - (*compress/gzip.Writer).Close
        - (*archive/tar.Writer).Close
        - (*text/tabwriter.Writer).Flush
    misspell:
      locale: US
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - unused
      - path: go/runtime/job/hatchet/
        linters:
          - unused
      - path: go/runtime/job/restate/
        linters:
          - unused
      - path: go/runtime/job/temporal/
        linters:
          - unused
      - path: go/ai/llm/routellm/
        linters:
          - unused
    paths:
      - vendor
      - node_modules
      - .venv
