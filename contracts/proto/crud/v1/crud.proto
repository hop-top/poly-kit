syntax = "proto3";
package crud.v1;
option go_package = "hop.top/kit/contracts/proto/crud/v1;crudv1";

import "google/protobuf/struct.proto";

// EntityService provides generic CRUD operations over arbitrary
// domain entities. Payloads use google.protobuf.Struct so callers
// can work with any schema without per-type proto definitions.
service EntityService {
  // Create persists a new entity and returns the stored result.
  rpc Create(CreateRequest) returns (CreateResponse);
  // Get retrieves a single entity by ID.
  rpc Get(GetRequest) returns (GetResponse);
  // List returns entities matching the query parameters.
  rpc List(ListRequest) returns (ListResponse);
  // Update replaces an existing entity and returns the result.
  rpc Update(UpdateRequest) returns (UpdateResponse);
  // Delete removes an entity by ID.
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message CreateRequest {
  // Untyped entity payload.
  google.protobuf.Struct entity = 1;
}

message CreateResponse {
  // Persisted entity with server-assigned fields (e.g. ID).
  google.protobuf.Struct entity = 1;
}

message GetRequest {
  string id = 1;
}

message GetResponse {
  google.protobuf.Struct entity = 1;
}

message ListRequest {
  // Maximum number of results to return. Zero means server default.
  int32 limit = 1;
  // Number of results to skip (for pagination).
  int32 offset = 2;
  // Field name to order by.
  string sort = 3;
  // Free-text search filter.
  string search = 4;
}

message ListResponse {
  repeated google.protobuf.Struct entities = 1;
}

message UpdateRequest {
  google.protobuf.Struct entity = 1;
}

message UpdateResponse {
  google.protobuf.Struct entity = 1;
}

message DeleteRequest {
  string id = 1;
}

message DeleteResponse {}
