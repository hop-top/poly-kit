syntax = "proto3";
package bridge.v1;
option go_package = "hop.top/kit/contracts/bridge;bridgev1";

// Payload is the wire-level inbox message. Exactly one of
// text/url/file/blob must be set; receivers reject zero or multiple.
//
// Scope of this file:
//   - Documents semantics + binary protobuf wire format only.
//   - JSON wire keys are NOT defined here. Authoritative JSON schema
//     is contracts/bridge.schema.json — that file governs what
//     non-Go shells (Swift Share Extension, browser ext, Shortcuts)
//     produce and what receivers accept.
//   - proto3 default JSON mapping (camelCase) does NOT apply on the
//     bus. JSON wire keys are snake_case per bridge.schema.json and
//     the Go struct tags in go/bridge/payload.go.
//
// Do not run protoc-gen-go against this file without first reading
// bridge.schema.json. The JSON tags emitted by the generator would
// NOT match the wire format the receiver expects.
message Payload {
  // ULID generated by the shell.
  string id = 1;
  // Origin shell, e.g. "macos.share-ext", "macos.shortcuts".
  string source = 2;
  // Shell version (semver-ish; opaque to receiver).
  string source_version = 3;
  // Unix milliseconds at shell capture time.
  int64 timestamp = 4;

  oneof content {
    Text text = 10;
    Url  url  = 11;
    File file = 12;
    Blob blob = 13;
  }

  // Free-form metadata (lang, tags, shell hints).
  map<string, string> meta = 20;

  // Lock unused field-number gaps so future additions don't collide.
  reserved 5 to 9;     // future header fields
  reserved 14 to 19;   // future content kinds
  reserved 21 to 99;   // future trailer fields
}

// Text payload — UTF-8 body + optional MIME hint.
message Text {
  string body = 1;
  string mime = 2;
}

// Url payload — href, optional page title and user selection.
message Url {
  string href = 1;
  string title = 2;
  string selection = 3;
}

// File payload — local filesystem path + MIME hint + size in bytes.
message File {
  string path = 1;
  string mime = 2;
  int64  size = 3;
}

// Blob payload — inline bytes (<1 MiB), MIME hint, optional filename.
// On the JSON wire `data` is base64-encoded per bridge.schema.json.
message Blob {
  bytes  data = 1;
  string mime = 2;
  string filename = 3;
}
